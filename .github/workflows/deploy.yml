name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build id for cache-busting
        run: |
          BUILD="${GITHUB_SHA::7}"
          printf '%s' "$BUILD" > version.txt
          grep -rl '__BUILD__' index.html src | xargs sed -i "s/__BUILD__/$BUILD/g"
          echo "Stamped build id: $BUILD"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) using the workflow token,
          # since the repo's Pages site hasn't been created yet
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site — publish the repo root as-is
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
