name: Deploy site to GitHub Pages

# Publishes the static site in ./site to GitHub Pages. The site/ folder is the
# deploy root, so site/index.html -> "/", site/uk/index.html -> "/uk/", etc.
# (repo tooling — tools/, test/, serve.py, docs/ README assets — stays out of it).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
